id: scope_downgrade
name: Permission Scope Downgrade
category: reliability
severity: medium
targets: [llm_chat, mcp_tool]
tags: [reliability, auth, permissions, scope]

description: "API suddenly returned 403 for previously allowed operations and the agent didn't handle the permission change"
