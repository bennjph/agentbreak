id: irrelevant_retrieval
name: Irrelevant Retrieval
category: reliability
severity: medium
targets: [mcp_tool]
tags: [reliability, rag, retrieval, relevance]

description: "retrieval returned semantically similar but factually irrelevant results and the agent used them anyway"
