id: byzantine_agent
name: Byzantine Agent
category: multi_agent
severity: high
targets: [llm_chat, mcp_tool]
tags: [multi-agent, byzantine, trust, adversarial]

description: "one agent in a multi-agent system provided intentionally wrong results and other agents trusted it"
